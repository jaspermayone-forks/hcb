services:
  db:
    image: "postgres:15.13"
    volumes:
      - pg-data:/var/lib/postgresql/data
    environment:
      POSTGRES_HOST_AUTH_METHOD: trust
  redis:
    image: redis
    volumes:
      - redis-data:/data
  web:
    env_file:
      - .env.development
    build: ./
    command: bash -c 'rm -f /usr/src/app/tmp/pids/server.pid; ./bin/dev'
    volumes:
      - ./:/usr/src/app:cached
      # - tmp:/usr/src/app/tmp
      # - gems:/usr/local/bundle
      # - node_modules:/usr/src/app/node_modules
    depends_on:
      - db
      - redis
    environment:
      REDIS_URL: redis://redis:6379
      # Inside the container Rails must listen on all interfaces so Docker can
      # forward the published port; the host mapping below controls exposure.
      WEB_BIND: 0.0.0.0
    ports:
      - 127.0.0.1:3000:3000

volumes:
  pg-data:
  redis-data:
  tmp:
  gems:
  node_modules:
